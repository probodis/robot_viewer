services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file:
      - /etc/xrobotics/secrets/.env
    volumes:
      - ./backend:/app
      - /home/ubuntu/xcubes/:/data:ro
      - /home/ubuntu/logs/robot_viewer/:/logs
    restart: always
    command: gunicorn app.main:app -w 4 -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:8000

  # frontend: deploy by make deploy command